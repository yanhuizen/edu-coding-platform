version: '3.8'

# ==============================================
#  Docker 镜像源配置（国内网络请选择可用的镜像）
# ==============================================
#  如果当前镜像拉取失败,请尝试下面其他镜像源:
#
#  1. 中科大 (默认): docker.mirrors.ustc.edu.cn/library/mongo:7
#  2. 网易:          hub-mirror.c.163.com/library/mongo:7
#  3. 百度云:        mirror.baidubce.com/library/mongo:7
#  4. 阿里云 (需登录): registry.cn-hangzhou.aliyuncs.com/library/mongo:7
#  5. DaoCloud:      docker.mirrors.daocloud.io/library/mongo:7
#  6. 官方源:        mongo:7
#
#  也可以配置 Docker Desktop 镜像加速器(推荐):
#  Settings → Docker Engine → 添加 registry-mirrors
# ==============================================

services:
  mongo:
    # 多镜像源备选:拉取失败请换上面列表里的其他地址
    image: docker.mirrors.daocloud.io/library/mongo:7
    container_name: edu-coding-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - ./data/mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: edu_coding
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 5
